<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoya a La Hielera</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;500;900&display=swap" rel="stylesheet">
    <style>
        .donacion-card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff0000;
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 400px;
            text-align: center;
            color: white;
        }
        .icon { width: 40px; margin-bottom: 10px; }
        .data-box { background: #111; padding: 15px; border-radius: 10px; margin: 10px 0; }
        .back-link { display: block; margin-top: 20px; color: #ff0000; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <img src="logo.png" alt="La Hielera" class="logo">
            <h1>AYÚDANOS A AYUDAR</h1>
        </header>

        <section class="donacion-card">
            <div class="data-box">
                <img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png" class="icon" alt="Banco">
                <h3>PAGO MÓVIL</h3>
                <p>Banco: 0101</p>
                <p>Cuenta: 12345678</p>
                <p>Tel: 0424-1234567</p>
            </div>

            <div class="data-box">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991108.png" class="icon" alt="Zelle">
                <h3>ZELLE</h3>
                <p>zelle@example.com</p>
            </div>

            <a href="index.html" class="back-link">← VOLVER AL INICIO</a>
        </section>
    </div>
</body>
</html>
