<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Hielera - Turmero</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;500;900&display=swap" rel="stylesheet">
    <style>
        /* Animación para el botón de donaciones */
        @keyframes pulso {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        .btn-donate {
            background: #fff;
            color: #ff0000;
            font-weight: 900;
            border: 2px solid #ff0000;
            animation: pulso 2s infinite;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <img src="logo.png" alt="La Hielera" class="logo">
            <h1 class="brand-name">LA HIELERA</h1>
            <p class="subtitle">RESTAURANT - COFFEE & ICE CREAM</p>
        </header>

        <section class="links">
            <a href="donaciones.html" class="btn-link btn-donate">AYÚDANOS A AYUDAR</a>

            <div class="instagram-container">
                <button onclick="toggleInstagram()" class="btn-link" id="btn-ig-main">
                    INSTAGRAM ▼
                </button>
                <div id="sub-links-ig" class="sub-menu" style="display: none;">
                    <a href="https://www.instagram.com/lahieleracoffee/" class="btn-link sub-item">COFFEE</a>
                    <a href="https://www.instagram.com/lahielerarumbera/" class="btn-link sub-item">RUMBERA</a>
                    <a href="https://www.instagram.com/lahielerabodegon/" class="btn-link sub-item">BODEGÓN</a>
                </div>
            </div>

            <a href="https://api.whatsapp.com/send/?phone=584243010770" class="btn-link">RESERVACIONES</a>
            <a href="https://maps.app.goo.gl/35St4FDaA5xZcnmv5" class="btn-link">UBICACIÓN</a>
            <a href="menu.html" class="btn-link">MENÚ DIGITAL</a>
            
            <button onclick="copyWifi()" class="btn-link btn-wifi">CONECTAR WIFI</button>
        </section>

        <footer>
            <p>ZONA INDUSTRIAL, SAN PABLO – TURMERO, ARAGUA</p>
            <p>By: Sentinel Systems™</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
